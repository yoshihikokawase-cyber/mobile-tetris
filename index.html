<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Mobile Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <h1>TETRIS</h1>
      <div id="header-controls">
        <button id="btn-pause" class="ctrl-btn" aria-label="Pause" data-testid="pause-button">⏸</button>
        <button id="btn-restart" class="ctrl-btn" aria-label="Restart" data-testid="restart-button">🔄</button>
      </div>
    </header>

    <!-- Main Game Area -->
    <main id="main">
      <!-- Side panel: Score + Next -->
      <aside id="side-panel">
        <div class="panel-box" id="score-box">
          <div class="panel-label">SCORE</div>
          <div class="panel-value" id="score" data-testid="score">0</div>
          <div class="panel-label best-label">BEST</div>
          <div class="panel-value" id="best">0</div>
          <div class="panel-label">LEVEL</div>
          <div class="panel-value" id="level" data-testid="level">1</div>
          <div class="panel-label">LINES</div>
          <div class="panel-value" id="lines" data-testid="lines">0</div>
        </div>
        <div class="panel-box" id="hold-box">
          <div class="panel-label">HOLD</div>
          <canvas id="hold-canvas" width="80" height="80"></canvas>
        </div>
        <div class="panel-box" id="next-box">
          <div class="panel-label">NEXT</div>
          <canvas id="next-canvas" width="80" height="156"></canvas>
        </div>
      </aside>

      <!-- Game Canvas Wrapper -->
      <div id="canvas-wrapper">
        <canvas id="game-canvas" data-testid="game-canvas"></canvas>

        <!-- Overlay screens -->
        <div id="overlay" class="hidden">
          <div id="overlay-content">
            <div id="overlay-title"></div>
            <div id="overlay-score-display"></div>
            <button id="overlay-btn" class="big-btn" data-testid="start-button">START</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Mobile Controls: left=movement / right=rotate+drop -->
    <div id="mobile-controls" data-testid="controls">
      <div id="ctrl-left">
        <div class="ctrl-row">
          <button id="btn-hold" class="game-btn hold-btn" aria-label="Hold (C)">C<span class="btn-label">HOLD</span></button>
        </div>
        <div class="ctrl-row">
          <button id="btn-left"  class="game-btn" aria-label="Left">◀</button>
          <button id="btn-right" class="game-btn" aria-label="Right">▶</button>
        </div>
        <div class="ctrl-row">
          <button id="btn-soft"  class="game-btn" aria-label="Soft Drop">▼</button>
        </div>
      </div>
      <div id="ctrl-right">
        <button id="btn-hard"   class="game-btn hard-btn"   aria-label="Hard Drop">⬇<span class="btn-label">DROP</span></button>
        <button id="btn-rotate" class="game-btn rotate-btn" aria-label="Rotate">↺</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
